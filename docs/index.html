<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Screener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2230;
      --border: #2a3347; --accent: #58a6ff; --green: #3fb950;
      --red: #f85149; --text: #e6edf3; --muted: #8b949e; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 340px; min-width: 340px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
    .sidebar-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; }
    .meta-bar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; font-size: 11px; }
    .meta-title { font-weight: 600; color: var(--accent); }
    .meta-count { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); border-radius: 20px; padding: 1px 7px; color: var(--accent); }
    .meta-time { color: var(--muted); }
    .stock-list { flex: 1; overflow-y: auto; padding: 8px; }
    .stock-card { padding: 14px; border-radius: var(--radius); cursor: pointer; transition: background .15s; border: 1px solid transparent; margin-bottom: 4px; }
    .stock-card:hover { background: var(--surface2); border-color: var(--border); }
    .stock-card.active { background: var(--surface2); border-color: var(--accent); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .card-left .symbol { font-size: 15px; font-weight: 700; }
    .card-left .name { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .card-right .price { font-size: 15px; font-weight: 600; text-align: right; }
    .card-right .change { font-size: 11px; text-align: right; margin-top: 2px; }
    .card-signal { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: rgba(88,166,255,0.1); color: var(--accent); border: 1px solid rgba(88,166,255,0.25); border-radius: 20px; padding: 2px 8px; margin-top: 4px; }
    .up { color: var(--green); } .down { color: var(--red); }
    .main-panel { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .details-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .details-title .symbol { font-size: 30px; font-weight: 800; }
    .details-title .company { font-size: 15px; color: var(--muted); margin-top: 4px; }
    .price-block { text-align: right; }
    .price-block .big-price { font-size: 36px; font-weight: 700; }
    .price-block .price-change { font-size: 16px; margin-top: 4px; }
    .signal-banner { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.25); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; font-size: 14px; }
    .signal-label { font-weight: 600; color: var(--green); }
    .signal-analysis { color: var(--muted); }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .metric-value { font-size: 18px; font-weight: 600; }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .rsi-track { height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 8px; position: relative; }
    .rsi-fill { height: 100%; border-radius: 3px; position: relative; }
    .rsi-marker { position: absolute; top: -3px; right: -6px; width: 12px; height: 12px; border-radius: 50%; background: white; border: 2px solid; }
    .scan-info { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--muted); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Swing Screener</h1>
        <div id="meta-bar" class="meta-bar"></div>
      </div>
      <div id="screener-list" class="stock-list"></div>
    </div>
    <div class="main-panel" id="main-panel">
      <div class="empty-state">
        <div class="empty-icon">&#128200;</div>
        <h2>Select a stock</h2>
        <p>Click any stock from the live Robinhood scan to see details.</p>
      </div>
    </div>
  </div>
  <script>
    const SCAN_DATA = {"meta": {"scan_id": "b7fb4961-de0b-4eed-b828-57084745e2da", "scan_title": "Swing Screener Trigger", "total_items": 397, "filters_applied": [{"filter_type": "RSI", "predicate": "BETWEEN", "values": ["30", "65"], "interval": "1d", "length": 14}, {"filter_type": "Relative volume", "predicate": ">=", "values": ["1.0"], "interval": "1d", "length": 30}, {"filter_type": "Market cap", "predicate": ">=", "values": ["1000000000"]}, {"filter_type": "Last", "predicate": "BETWEEN", "values": ["10", "300"]}, {"filter_type": "Asset type", "predicate": "=", "values": ["STOCK"]}], "sorted_by": "Market cap desc"}, "stocks": [{"symbol": "NVDA", "instrument_id": "a4ecd608-e7b4-4ff3-afa5-f77ae7632dfb", "name": "NVIDIA", "price": 197.58, "change": 0.0, "change_pct": 0.0, "volume": 146527957, "relative_volume": 1.0, "rsi": 43.28, "market_cap_raw": 4846379890000.0, "market_cap": "$4.85T", "signal": "Pullback to Support"}, {"symbol": "AAPL", "instrument_id": "450dfc6d-5510-4d40-abfb-f633b7d9be3e", "name": "Apple", "price": 295.69, "change": 0.0, "change_pct": 0.0, "volume": 46523773, "relative_volume": 1.0, "rsi": 50.97, "market_cap_raw": 4249933332160.0, "market_cap": "$4.25T", "signal": "Trend Continuation"}, {"symbol": "AMZN", "instrument_id": "c0bb3aec-bd1e-471e-a4f0-ca011cbec711", "name": "Amazon", "price": 241.69, "change": 0.0, "change_pct": 0.0, "volume": 43060695, "relative_volume": 1.0, "rsi": 47.83, "market_cap_raw": 2563849462976.0, "market_cap": "$2.56T", "signal": "Trend Continuation"}, {"symbol": "SPCX", "instrument_id": "ef5d2600-32d1-41f5-bfbe-abacac264d2a", "name": "SpaceX", "price": 157.73, "change": 0.0, "change_pct": 0.0, "volume": 50543694, "relative_volume": 1.0, "rsi": 45.34, "market_cap_raw": 2249090668419.0, "market_cap": "$2.25T", "signal": "Pullback to Support"}, {"symbol": "INTC", "instrument_id": "e7aedbd3-0e6f-4b17-9fef-ff74c1c81ddb", "name": "Intel", "price": 127.35, "change": 0.0, "change_pct": 0.0, "volume": 54046083, "relative_volume": 1.0, "rsi": 53.53, "market_cap_raw": 701776560000.0, "market_cap": "$701.8B", "signal": "Trend Continuation"}, {"symbol": "XOM", "instrument_id": "6abe9dc2-e034-4d64-ac72-6dc4af7fcb66", "name": "Exxon Mobil", "price": 136.33, "change": 0.0, "change_pct": 0.0, "volume": 26226697, "relative_volume": 1.0, "rsi": 34.44, "market_cap_raw": 566740000000.0, "market_cap": "$566.7B", "signal": "Oversold Bounce"}, {"symbol": "CSCO", "instrument_id": "c228f2b6-4f9b-4ef6-acdb-3a9b31ee9ea5", "name": "Cisco Systems", "price": 116.66, "change": 0.0, "change_pct": 0.0, "volume": 30234264, "relative_volume": 1.0, "rsi": 50.17, "market_cap_raw": 463006048080.0, "market_cap": "$463.0B", "signal": "Trend Continuation"}, {"symbol": "KO", "instrument_id": "e5e21aba-f1af-4a7e-bea2-3649d44cb2e8", "name": "Coca-Cola", "price": 81.3, "change": 0.0, "change_pct": 0.0, "volume": 16613396, "relative_volume": 1.0, "rsi": 53.74, "market_cap_raw": 349651904000.0, "market_cap": "$349.7B", "signal": "Trend Continuation"}, {"symbol": "PG", "instrument_id": "3142b7a2-0e6c-4ca3-a6fe-e31765c6ad5c", "name": "Procter & Gamble", "price": 146.84, "change": 0.0, "change_pct": 0.0, "volume": 12069040, "relative_volume": 1.0, "rsi": 49.67, "market_cap_raw": 341524172800.0, "market_cap": "$341.5B", "signal": "Trend Continuation"}, {"symbol": "MS", "instrument_id": "1cedd609-04d9-4e3e-8f01-c0da84a34a70", "name": "Morgan Stanley", "price": 210.76, "change": 0.0, "change_pct": 0.0, "volume": 8553862, "relative_volume": 1.0, "rsi": 50.14, "market_cap_raw": 329748192000.0, "market_cap": "$329.7B", "signal": "Trend Continuation"}]};
    const list = document.getElementById('screener-list');
    const panel = document.getElementById('main-panel');
    const metaBar = document.getElementById('meta-bar');

    (function init() {
      const { stocks, meta } = SCAN_DATA;
      metaBar.innerHTML =
        '<span class="meta-title">' + meta.scan_title + '</span>' +
        '<span class="meta-count">' + meta.total_items + ' matches</span>' +
        '<span class="meta-time">Margin-aware</span>';
      list.innerHTML = '';
      stocks.forEach(s => {
        const up = s.change_pct >= 0;
        const card = document.createElement('div');
        card.className = 'stock-card';
        card.innerHTML =
          '<div class="card-top">' +
            '<div class="card-left"><div class="symbol">' + s.symbol + '</div><div class="name">' + s.name + '</div></div>' +
            '<div class="card-right"><div class="price">$' + Number(s.price).toFixed(2) + '</div>' +
            '<div class="change ' + (up ? 'up' : 'down') + '">' + (up ? '&#9650;' : '&#9660;') + ' ' + Math.abs(s.change_pct).toFixed(2) + '%</div></div>' +
          '</div>' +
          '<div class="card-signal">&#9889; ' + s.signal + '</div>';
        card.addEventListener('click', () => showDetails(s, card));
        list.appendChild(card);
      });
    })();

    function showDetails(s, cardEl) {
      document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
      cardEl.classList.add('active');
      const up = s.change_pct >= 0;
      const rsiColor = s.rsi > 65 ? 'var(--red)' : s.rsi < 35 ? 'var(--green)' : 'var(--accent)';
      const rsiLabel = s.rsi < 35 ? 'Oversold' : s.rsi > 65 ? 'Overbought' : 'Neutral';
      panel.innerHTML =
        '<div class="details-header">' +
          '<div class="details-title"><div class="symbol">' + s.symbol + '</div><div class="company">' + s.name + '</div></div>' +
          '<div class="price-block"><div class="big-price">$' + Number(s.price).toFixed(2) + '</div>' +
          '<div class="price-change ' + (up ? 'up' : 'down') + '">' + (up ? '&#9650;' : '&#9660;') + ' $' + Math.abs(s.change).toFixed(2) + ' (' + Math.abs(s.change_pct).toFixed(2) + '%)</div></div>' +
        '</div>' +
        '<div class="signal-banner"><div>&#9889;</div><div>' +
          '<span class="signal-label">' + s.signal + '</span>' +
          '<span class="signal-analysis"> &mdash; RSI ' + s.rsi.toFixed(1) + ' &middot; Rel Vol ' + s.relative_volume.toFixed(2) + 'x &middot; ' + s.market_cap + '</span>' +
        '</div></div>' +
        '<div class="metrics-grid">' +
          metric('Volume', fmtVol(s.volume), s.relative_volume.toFixed(2) + 'x avg') +
          metric('Market Cap', s.market_cap) +
          metric('Price', '$' + Number(s.price).toFixed(2)) +
          metric('Change', (up ? '+' : '') + s.change_pct.toFixed(2) + '%', (up ? '+$' : '-$') + Math.abs(s.change).toFixed(2)) +
          rsiMetric(s.rsi, rsiColor, rsiLabel) +
        '</div>' +
        '<div class="scan-info"><div class="section-title">Scan Rules &mdash; Robinhood Margin Account</div>' +
          '<div class="filter-chips">' +
            '<span class="chip">RSI 30&ndash;65</span>' +
            '<span class="chip">Rel Vol &ge; 1&times;</span>' +
            '<span class="chip">Mkt Cap &ge; $1B</span>' +
            '<span class="chip">Price $10&ndash;$300</span>' +
            '<span class="chip">Stocks only</span>' +
          '</div></div>';
    }

    function metric(label, value, sub) {
      return '<div class="metric-card"><div class="metric-label">' + label + '</div><div class="metric-value">' + value + '</div>' + (sub ? '<div class="metric-sub">' + sub + '</div>' : '') + '</div>';
    }
    function rsiMetric(rsi, color, label) {
      return '<div class="metric-card"><div class="metric-label">RSI (14-day)</div><div class="metric-value" style="color:' + color + '">' + rsi.toFixed(1) + '</div><div class="metric-sub">' + label + '</div><div class="rsi-track"><div class="rsi-fill" style="width:' + rsi + '%;background:' + color + '"><div class="rsi-marker" style="border-color:' + color + '"></div></div></div></div>';
    }
    function fmtVol(v) {
      if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
      if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
      return String(v);
    }
  </script>
</body>
</html>
