    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 340px; min-width: 340px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
    .sidebar-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 17px; font-weight: 700; }
    .meta-bar { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-top: 6px; font-size: 11px; }
    .meta-title { font-weight: 600; color: var(--accent); }
    .meta-count { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); border-radius: 20px; padding: 1px 7px; color: var(--accent); }
    .meta-time { color: var(--muted); }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; flex: 1; overflow-y: auto; }
    .tab-pane.active { display: flex; flex-direction: column; }
    .stock-list { flex: 1; overflow-y: auto; padding: 8px; }
    .stock-card { padding: 12px 14px; border-radius: var(--radius); cursor: pointer; transition: background .15s; border: 1px solid transparent; margin-bottom: 4px; }
    .stock-card:hover { background: var(--surface2); border-color: var(--border); }
    .stock-card.active { background: var(--surface2); border-color: var(--accent); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .card-left .sym { font-size: 14px; font-weight: 700; }
    .card-left .nm { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .card-right .pr { font-size: 14px; font-weight: 600; text-align: right; }
    .card-right .ch { font-size: 11px; text-align: right; margin-top: 1px; }
    .card-signal { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; background: rgba(88,166,255,0.08); color: var(--accent); border: 1px solid rgba(88,166,255,0.2); border-radius: 20px; padding: 2px 7px; margin-top: 3px; }
    .up { color: var(--green); } .down { color: var(--red); }

    .cycle-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cycle-num { font-size: 12px; font-weight: 700; color: var(--accent); }
    .cycle-time { font-size: 11px; color: var(--muted); }
    .exec-item { background: var(--surface); border: 1px solid; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
    .exec-item.sell { border-color: rgba(248,81,73,0.3); }
    .exec-item.buy { border-color: rgba(63,185,80,0.3); }
    .exec-item.info { border-color: var(--border); }
    .exec-sym { font-weight: 700; font-size: 13px; }

    .score-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    .details-title .dsym { font-size: 30px; font-weight: 800; }

    .price-block .price-change { font-size: 16px; margin-top: 4px; }

    .signal-label { font-weight: 600; color: var(--green); }
    .signal-analysis { color: var(--muted); }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .metric-value { font-size: 18px; font-weight: 600; }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .rsi-track { height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 8px; position: relative; overflow: visible; }
    .rsi-fill { height: 100%; border-radius: 3px; position: relative; }
    .rsi-marker { position: absolute; top: -3px; right: -6px; width: 12px; height: 12px; border-radius: 50%; background: white; border: 2px solid; }
    .scan-info { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--muted); }

const listEl = document.getElementById('stock-list');
const panelEl = document.getElementById('main-panel');
let allStocks = SCAN_DATA.stocks;

function renderList(stocks) {
  listEl.innerHTML = '';
  stocks.forEach(s => {
    const up = s.change_pct >= 0;
    const d = document.createElement('div');
    d.className = 'stock-card'; d.dataset.sym = s.symbol;
    d.innerHTML = '<div class="card-top"><div class="card-left"><div class="sym">' + s.symbol + '</div><div class="nm">' + s.name + '</div></div>' +
      '<div class="card-right"><div class="pr">$' + Number(s.price).toFixed(2) + '</div><div class="ch ' + (up?'up':'down') + '">' + (up?'&#9650;':'&#9660;') + ' ' + Math.abs(s.change_pct).toFixed(2) + '%</div></div></div>' +
      '<div class="card-signal">&#9889; ' + s.signal + '</div>';
    d.onclick = () => showDetails(s, d);
    listEl.appendChild(d);
  });
}
function filterStocks(q) {
  q = q.toLowerCase();
  renderList(q ? allStocks.filter(s => s.symbol.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)) : allStocks);
}
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
function showDetails(s, cardEl) {
  document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');
  const up = s.change_pct >= 0;
  const rsiColor = s.rsi > 65 ? 'var(--red)' : s.rsi < 35 ? 'var(--green)' : 'var(--accent)';
  const rsiLabel = s.rsi < 35 ? 'Oversold' : s.rsi > 65 ? 'Overbought' : 'Neutral';
  const mcap = fmtMcap(s.market_cap);
  panelEl.innerHTML =
    '<div class="details-header"><div class="details-title"><div class="dsym">' + s.symbol + '</div><div class="dco">' + s.name + '</div></div>' +
    '<div class="price-block"><div class="big-price">$' + Number(s.price).toFixed(2) + '</div>' +
    '<div class="price-change ' + (up?'up':'down') + '">' + (up?'&#9650;':'&#9660;') + ' $' + Math.abs(s.change).toFixed(2) + ' (' + Math.abs(s.change_pct).toFixed(2) + '%)</div></div></div>' +
    '<div class="signal-banner"><div>&#9889;</div><div><span class="signal-label">' + s.signal + '</span>' +
    '<span class="signal-analysis"> &mdash; RSI ' + s.rsi.toFixed(1) + ' &middot; Rel Vol ' + s.relative_volume.toFixed(2) + 'x &middot; ' + mcap + '</span></div></div>' +
    '<div class="metrics-grid">' +
    metric('Volume', fmtVol(s.volume), s.relative_volume.toFixed(2) + 'x avg') +
    metric('Market Cap', mcap) + rsiMetric(s.rsi, rsiColor, rsiLabel) +
    metric('Price', '$' + Number(s.price).toFixed(2)) +
    metric('Change', (up?'+':'') + s.change_pct.toFixed(2) + '%', (up?'+':'') + '$' + s.change.toFixed(2)) + '</div>' +
    '<div class="scan-info"><div class="section-title">Live Scan Filters</div><div class="filter-chips">' +
    '<span class="chip">RSI 30&ndash;65</span><span class="chip">Rel Vol &ge; 1&times;</span>' +
    '<span class="chip">Mkt Cap &ge; $1B</span><span class="chip">Price $10&ndash;$300</span>' +
    '<span class="chip">Stocks only</span><span class="chip">Auto-refreshed 15 min</span></div></div>';
}
function metric(label, value, sub) {
  return '<div class="metric-card"><div class="metric-label">' + label + '</div><div class="metric-value">' + value + '</div>' + (sub ? '<div class="metric-sub">' + sub + '</div>' : '') + '</div>';
}
function rsiMetric(rsi, color, label) {
  return '<div class="metric-card"><div class="metric-label">RSI (14-day)</div><div class="metric-value" style="color:' + color + '">' + rsi.toFixed(1) + '</div><div class="metric-sub">' + label + '</div><div class="rsi-track"><div class="rsi-fill" style="width:' + Math.min(rsi,100) + '%;background:' + color + '"><div class="rsi-marker" style="border-color:' + color + '"></div></div></div></div>';
}
function fmtVol(v) { if (v>=1e6) return (v/1e6).toFixed(1)+'M'; if (v>=1e3) return (v/1e3).toFixed(0)+'K'; return String(v); }
function fmtMcap(v) { try { const n=parseFloat(v); if(n>=1e12) return '$'+(n/1e12).toFixed(1)+'T'; if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B'; if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; return '$'+n.toFixed(0); } catch(e) { return v||'N/A'; } }

function renderActivity() {
  const el = document.getElementById('activity-list');
  el.innerHTML = ACTIVITY_LOG.slice().reverse().map(c => {
    const execs = (c.executions||[]).map(e => {
      const cls = e.type.includes('BUY')?'buy':'sell';
      const tag = e.type==='STOP_LOSS_CLOSE'?'stop':cls;
      return '<div class="exec-item ' + cls + '"><div><span class="exec-sym">' + e.symbol + '</span>' +
        '<span class="exec-type ' + tag + '">' + e.type.replace(/_/g,' ') + '</span> ' +
        e.qty.toFixed(4) + ' sh @ ~$' + e.price_approx.toFixed(2) + '</div>' +
        '<div class="exec-reason">' + e.reason + '</div>' +
        (e.order_id ? '<div style="font-size:10px;color:var(--muted);margin-top:3px;">Order ' + e.order_id.slice(0,8) + '&#8230; &middot; ' + e.order_state + '</div>' : '') + '</div>';
    }).join('') || '<div class="exec-item info" style="color:var(--muted);font-size:12px;">No trades this cycle &mdash; waiting for confirmation</div>';

    const scores = c.scores ? Object.entries(c.scores).map(([sym,sc]) =>
      '<span class="score-chip' + (sc>=6?' pass':'') + '">' + sym + ' ' + sc + '/10</span>'
    ).join('') : '';

    const pos = (c.positions_after||[]).map(p => {
      const up = p.pct_chg>=0;
      return '<div class="pos-row"><span class="pos-label">' + p.symbol + ' &times;' + p.qty + ' @ $' + p.avg_cost + '</span>' +
        '<span class="' + (up?'up':'down') + '">' + (up?'+':'') + p.pct_chg.toFixed(2) + '%</span></div>';
    }).join('') || '<div style="font-size:11px;color:var(--muted)">No open strategy positions</div>';

    return '<div class="cycle-card">' +
      '<div class="cycle-header"><span class="cycle-num">Cycle #' + c.cycle + '</span><span class="cycle-time">' + c.time_display + '</span></div>' +
      execs +
      (scores ? '<div style="margin-top:8px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;">Scores</div><div class="score-row">' + scores + '</div>' : '') +
      '<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;">Positions</div>' +
      pos +
      '<div class="account-row"><span>Portfolio: $' + c.account_value.toFixed(2) + '</span><span>BP: $' + c.buying_power.toFixed(2) + '</span></div>' +
      '<div class="verdict-bar">' + c.verdict + '</div></div>';
  }).join('');
}

renderList(allStocks);
renderActivity();
</script>
