<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Screener</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar: screener list -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Swing Screener</h1>
        <div id="meta-bar" class="meta-bar"></div>
      </div>
      <div id="screener-list" class="stock-list"></div>
    </div>

    <!-- Main panel: stock details -->
    <div class="main-panel" id="main-panel">
      <div class="empty-state">
        <div class="empty-icon">📈</div>
        <h2>Select a stock</h2>
        <p>Click any stock from the live Robinhood scan to see details.</p>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
